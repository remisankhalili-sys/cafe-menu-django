<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب کاربری</title> 
</head>
<style>

@font-face{
 font-family: 'FontMan';
 src: url('myfont/IRANYekan.ttf') format('truetype'),
 url('myfont/IRANYekan.woff') format('woff'),
 url('myfont/IRANYekan.woff2') format('woff2');
}

body{
 font-family:FontMan;
 text-align:center;
}
ul {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    list-style: none;
    padding: 0;
    max-width: 900px; 
    margin: 30px auto; 
    gap: 20px; 
}
a {
    text-decoration: none;
    color: inherit; 
}
li {
    background: #ffffff;
    border: 1px solid #f0f0f0;
    border-radius: 20px;
    padding: 30px 20px;
    transition: all 0.3s ease; 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.03);
}
li:hover {
    transform: translateY(-5px); 
    box-shadow: 0 10px 25px rgba(0, 123, 255, 0.1);
    border-color: #007bff;
}
.section-title {
    font-size: 16px;
    color: #444;
    margin: 0;
    border: none !important; 
    font-weight: 500;
}

</style>
<body>
    <ul>
        <li>
            <h1 class="section-title">
            <a href="">پنل کاربری</a></h1>
        </li>
        <li>
            <h2 class="section-title">
            <a href="">سفارش های من </a></h2>
        </li>
        
        <li>
            <h2 class="section-title">
            <a href="">لیست علاقه‌مندی‌ها</a></h2>
        </li>
                
        <li>
            <h2 class="section-title">
            <a href="">خروج</a></h2>
        </li>
    </ul>
    <div class="orders-container">
    {% for order in orders %}

 
    

    {% endfor %}
</body>
</html>
